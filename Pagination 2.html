<!DOCTYPE html>
<html lang="en">

<head>
    <title>Pagination 2</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body>

    <p>

        The main content goes here. After this will be the pagination (since it is an example, it doesn't actually
        work.)

    </p>

    <div class="container">
        <h2>Pagination 2</h2>
        <!-- Declare the pagination class -->
        <ul class="pagination">

            <!-- Declare the item in the group -->
            <li class="page-item">

                <!-- Declare the link of the item -->
                <a class="page-link" href="#">Previous</a>
            </li>

            <!-- Rest of the pagination items -->
            <li class="page-item">
                <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">2</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">3</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">Next</a>
            </li>
        </ul>
    </div>
</body>

</html>
